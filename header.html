<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Header Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .simple-header {
            background-color: #F9CAD2; /* 品牌粉色背景 */
            padding: 20px 40px;
            display: flex;
            justify-content: flex-end; /* 讓導航按鈕靠右排列 */
            align-items: center;
        }
        .simple-nav {
            display: flex;
            gap: 25px; /* 按鈕之間的間距 */
        }
        .simple-nav a {
            text-decoration: none;
            color: #666666; /* 深灰色文字 */
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .simple-nav a:hover {
            color: #FFFFFF; /* 滑鼠移過去變白色 */
        }
    </style>
</head>
<body>
    <header class="simple-header">
        <nav class="simple-nav">
            <a href="#home">Home</a>
            <a href="#about-me">About Me</a>
            <a href="#journey">My Journey</a>
            <a href="#work">My Work</a>
            <a href="#research">My research</a>
            <a href="#contact">Contact Me</a>
        </nav>
    </header>
</body>
</html>
